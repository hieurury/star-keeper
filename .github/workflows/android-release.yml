name: Android Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Inject Vite build environment
        shell: bash
        run: |
          : > .env.production

          if [ -n "${VITE_SUPABASE_URL}" ]; then
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}" >> .env.production
          fi
          if [ -n "${VITE_SUPABASE_ANON_KEY}" ]; then
            echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}" >> .env.production
          fi
          if [ -n "${VITE_UPDATE_MANIFEST_URL}" ]; then
            echo "VITE_UPDATE_MANIFEST_URL=${VITE_UPDATE_MANIFEST_URL}" >> .env.production
          fi
          if [ -n "${VITE_NATIVE_OAUTH_SCHEME}" ]; then
            echo "VITE_NATIVE_OAUTH_SCHEME=${VITE_NATIVE_OAUTH_SCHEME}" >> .env.production
          fi

          echo "Injected .env.production keys:"
          sed 's/=.*$/=[hidden]/' .env.production || true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_UPDATE_MANIFEST_URL: ${{ vars.VITE_UPDATE_MANIFEST_URL }}
          VITE_NATIVE_OAUTH_SCHEME: ${{ vars.VITE_NATIVE_OAUTH_SCHEME }}

      - name: Validate signing secrets presence
        shell: bash
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required signing secrets are missing."
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Decode Android keystore
        shell: bash
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Verify keystore and alias
        shell: bash
        run: |
          set +e
          keytool -list \
            -keystore android/app/release-keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            > /tmp/keystore-list.txt 2>&1
          status=$?
          set -e

          if [ "$status" -ne 0 ]; then
            echo "Failed to open keystore. ANDROID_KEYSTORE_PASSWORD or ANDROID_KEYSTORE_BASE64 is likely incorrect."
            cat /tmp/keystore-list.txt
            exit 1
          fi

          if ! grep -qi "${{ secrets.ANDROID_KEY_ALIAS }}" /tmp/keystore-list.txt; then
            echo "Alias not found in keystore. Please check ANDROID_KEY_ALIAS secret."
            echo "Detected aliases from keystore:"
            awk -F, 'NR>1 && $0 ~ /,/{gsub(/^ +| +$/, "", $1); print "- " $1}' /tmp/keystore-list.txt || true
            exit 1
          fi

          echo "Keystore + alias validated successfully"

      - name: Prepare gradlew on Linux runner
        shell: bash
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Build signed release APK
        shell: bash
        run: |
          npm run cap:sync:android
          cd android
          ./gradlew assembleRelease \
            --stacktrace \
            -PANDROID_SIGNING_STORE_FILE=release-keystore.jks \
            -PANDROID_SIGNING_STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PANDROID_SIGNING_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PANDROID_SIGNING_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_VERSION="${GITHUB_REF_NAME}"
          else
            APP_VERSION=$(node -p "require('./package.json').version")
            RELEASE_VERSION="v${APP_VERSION}-manual-${GITHUB_RUN_NUMBER}"
          fi

          VERSIONED_APK="star-keeper@${RELEASE_VERSION}.apk"
          VERSIONED_METADATA="output-metadata@${RELEASE_VERSION}.json"

          cp android/app/build/outputs/apk/release/app-release.apk "release-artifacts/${VERSIONED_APK}"
          cp android/app/build/outputs/apk/release/app-release.apk release-artifacts/star-keeper.apk
          cp android/app/build/outputs/apk/release/output-metadata.json "release-artifacts/${VERSIONED_METADATA}"
          cp android/app/build/outputs/apk/release/output-metadata.json release-artifacts/output-metadata.json

          echo "Prepared artifacts:"
          ls -la release-artifacts

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.apk
            release-artifacts/*.json
          generate_release_notes: true
