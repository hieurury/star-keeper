name: Android Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Validate signing secrets presence
        shell: bash
        run: |
          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required signing secrets are missing."
            exit 1
          fi
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Decode Android keystore
        shell: bash
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is missing"
            exit 1
          fi
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release-keystore.jks

      - name: Verify keystore and alias
        shell: bash
        run: |
          keytool -list \
            -keystore android/app/release-keystore.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -alias "${{ secrets.ANDROID_KEY_ALIAS }}" > /tmp/keystore-check.txt
          echo "Keystore + alias validated successfully"

      - name: Prepare gradlew on Linux runner
        shell: bash
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Build signed release APK
        shell: bash
        run: |
          npm run cap:sync:android
          cd android
          ./gradlew assembleRelease \
            --stacktrace \
            -PANDROID_SIGNING_STORE_FILE=release-keystore.jks \
            -PANDROID_SIGNING_STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PANDROID_SIGNING_KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PANDROID_SIGNING_KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Prepare release artifacts
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp android/app/build/outputs/apk/release/app-release.apk release-artifacts/star-keeper.apk
          cp android/app/build/outputs/apk/release/output-metadata.json release-artifacts/output-metadata.json

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/star-keeper.apk
            release-artifacts/output-metadata.json
          generate_release_notes: true
